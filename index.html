<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Mackie's Diary</title>
<link rel="apple-touch-icon" href="icon.png">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FAF8F5;
    --warm-white: #FFFFFF;
    --sage: #8FAF8A;
    --sage-light: #E8F0E7;
    --sage-dark: #5A7A55;
    --blush: #E8C4B8;
    --blush-light: #F9EDE8;
    --blush-dark: #C4856E;
    --charcoal: #2C2C2A;
    --mid: #6B6B68;
    --light: #A8A8A5;
    --border: #ECEAE6;
    --gold: #C9A96E;
    --gold-light: #F5EDD8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--charcoal);
    min-height: 100vh;
    max-width: 430px;
    margin: 0 auto;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  .app-header {
    background: var(--warm-white);
    padding: 52px 20px 16px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .app-name {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 600;
    color: var(--charcoal);
    letter-spacing: -0.3px;
  }
  .app-name span { color: var(--sage-dark); }
  .app-date {
    font-size: 12px;
    color: var(--light);
    margin-top: 2px;
    font-weight: 300;
  }

  /* ── BOTTOM NAV ── */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 430px;
    background: var(--warm-white);
    border-top: 1px solid var(--border);
    display: flex;
    padding: 8px 0 20px;
    z-index: 100;
  }
  .nav-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 6px 0;
    border: none;
    background: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    color: var(--light);
    font-weight: 500;
    transition: color 0.2s;
  }
  .nav-btn.active { color: var(--sage-dark); }
  .nav-icon { font-size: 20px; }

  /* ── PAGES ── */
  .page { display: none; padding: 16px 16px 100px; }
  .page.active { display: block; }

  /* ── DAY SELECTOR ── */
  .day-scroll {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding: 4px 0 12px;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
  }
  .day-scroll::-webkit-scrollbar { display: none; }
  .day-pill {
    flex-shrink: 0;
    padding: 8px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--warm-white);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--mid);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .day-pill.active {
    background: var(--charcoal);
    color: white;
    border-color: var(--charcoal);
  }

  /* ── SECTION HEADERS ── */
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 500;
    color: var(--charcoal);
    margin: 16px 0 4px;
  }
  .section-sub {
    font-size: 12px;
    color: var(--light);
    margin-bottom: 12px;
    font-weight: 300;
  }
  .tag-pill {
    display: inline-block;
    font-size: 11px;
    font-weight: 500;
    padding: 3px 10px;
    border-radius: 20px;
    margin-bottom: 12px;
  }
  .tag-high { background: #E8F4E0; color: #3B6D11; }
  .tag-mod  { background: #E0EEF8; color: #1A5F9E; }
  .tag-low  { background: #F0EFE8; color: #5A5A58; }
  .tag-run  { background: #FDF0DC; color: #8A5010; }
  .tag-rest { background: #F0EFE8; color: #5A5A58; }

  /* ── MACRO BAR ── */
  .macro-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 16px;
  }
  .macro-card {
    background: var(--warm-white);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 8px;
    text-align: center;
  }
  .macro-num { font-size: 18px; font-weight: 500; color: var(--charcoal); }
  .macro-lbl { font-size: 10px; color: var(--light); margin-top: 2px; }

  /* ── MEAL CARDS ── */
  .meal-card {
    background: var(--warm-white);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 14px 16px;
    margin-bottom: 10px;
  }
  .meal-card.dessert { border-left: 3px solid var(--blush-dark); }
  .meal-card.preworkout { border-left: 3px solid var(--gold); }
  .meal-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }
  .meal-type { font-size: 10px; font-weight: 500; color: var(--light); text-transform: uppercase; letter-spacing: 0.05em; }
  .meal-kcal { font-size: 12px; color: var(--mid); }
  .meal-name { font-size: 15px; font-weight: 500; color: var(--charcoal); margin-bottom: 5px; }
  .meal-macros { font-size: 12px; color: var(--light); margin-bottom: 8px; }
  .ingredient-list { border-top: 1px solid var(--border); padding-top: 8px; }
  .ingredient { font-size: 13px; color: var(--mid); padding: 3px 0; display: flex; gap: 6px; }
  .ingredient::before { content: "·"; color: var(--light); }

  /* ── EXERCISE CARDS ── */
  .exercise-card {
    background: var(--warm-white);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 14px 16px;
    margin-bottom: 10px;
  }
  .ex-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .ex-name { font-size: 15px; font-weight: 500; color: var(--charcoal); flex: 1; padding-right: 8px; line-height: 1.3; }
  .ex-badge {
    font-size: 10px; font-weight: 500; padding: 3px 8px; border-radius: 20px;
    white-space: nowrap; flex-shrink: 0;
  }
  .badge-main { background: var(--sage-light); color: var(--sage-dark); }
  .badge-finish { background: var(--blush-light); color: var(--blush-dark); }
  .badge-warm { background: #F0EFE8; color: #5A5A58; }
  .ex-sets-row { font-size: 13px; color: var(--charcoal); font-weight: 500; margin-bottom: 3px; }
  .ex-rest { font-size: 12px; color: var(--light); margin-bottom: 8px; }
  .ex-notes { font-size: 12px; color: var(--mid); line-height: 1.6; border-top: 1px solid var(--border); padding-top: 8px; }

  /* ── SET TRACKER ── */
  .set-tracker { margin: 10px 0 4px; }
  .set-tracker-label { font-size: 11px; color: var(--light); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.04em; }
  .sets-grid { display: flex; flex-wrap: wrap; gap: 6px; }
  .set-row { display: flex; align-items: center; gap: 6px; background: var(--cream); border-radius: 10px; padding: 7px 10px; border: 1px solid var(--border); }
  .set-num { font-size: 11px; color: var(--light); min-width: 28px; }
  .set-input {
    width: 62px; font-size: 13px; font-family: 'DM Sans', sans-serif;
    border: none; background: transparent; color: var(--charcoal);
    border-bottom: 1px solid var(--border); text-align: center; padding: 1px 0;
    outline: none;
  }
  .set-input::placeholder { color: var(--light); font-size: 11px; }
  .set-check {
    width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid var(--border);
    background: white; display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0; transition: all 0.2s; font-size: 12px;
  }
  .set-check.done { background: var(--sage); border-color: var(--sage); color: white; }

  /* ── PR BOX ── */
  .pr-box {
    background: var(--gold-light);
    border: 1px solid #E8D5B0;
    border-radius: 12px;
    padding: 12px 14px;
    margin-top: 10px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .pr-label { font-size: 11px; color: var(--gold); font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; min-width: 28px; }
  .pr-input {
    flex: 1; font-size: 14px; font-family: 'DM Sans', sans-serif;
    border: none; background: transparent; color: var(--charcoal);
    border-bottom: 1px dashed #D4B88A; outline: none; padding: 2px 4px;
  }
  .pr-input::placeholder { color: #D4B88A; font-size: 12px; }

  /* ── PROGRESS BOX ── */
  .progress-box {
    background: var(--sage-light);
    border-radius: 12px;
    padding: 12px 14px;
    margin-top: 10px;
  }
  .progress-title { font-size: 11px; color: var(--sage-dark); font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 4px; }
  .progress-text { font-size: 12px; color: #4A6A46; line-height: 1.6; }

  /* ── SUMMARY PAGE ── */
  .summary-hero {
    background: var(--charcoal);
    border-radius: 20px;
    padding: 24px 20px;
    margin-bottom: 16px;
    color: white;
  }
  .summary-hero-name {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    margin-bottom: 4px;
  }
  .summary-hero-sub { font-size: 13px; color: rgba(255,255,255,0.6); }
  .week-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .week-card {
    background: var(--warm-white);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .week-card:active { transform: scale(0.97); }
  .week-card-day { font-size: 11px; color: var(--light); font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 4px; }
  .week-card-name { font-size: 14px; font-weight: 500; color: var(--charcoal); line-height: 1.3; margin-bottom: 8px; }
  .week-card-tag { font-size: 10px; font-weight: 500; padding: 2px 8px; border-radius: 20px; display: inline-block; }

  /* ── NOTES PAGE ── */
  .notes-textarea {
    width: 100%; min-height: 120px; font-family: 'DM Sans', sans-serif;
    font-size: 14px; color: var(--charcoal); background: var(--warm-white);
    border: 1px solid var(--border); border-radius: 14px; padding: 14px;
    resize: none; outline: none; line-height: 1.7;
  }
  .notes-card { background: var(--warm-white); border: 1px solid var(--border); border-radius: 14px; padding: 14px; margin-bottom: 10px; }
  .notes-card-label { font-size: 11px; color: var(--light); font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 8px; }
  .save-btn {
    width: 100%; padding: 14px; background: var(--charcoal); color: white;
    border: none; border-radius: 14px; font-family: 'DM Sans', sans-serif;
    font-size: 14px; font-weight: 500; cursor: pointer; margin-top: 8px;
    transition: opacity 0.2s;
  }
  .save-btn:active { opacity: 0.8; }

  .divider { height: 1px; background: var(--border); margin: 16px 0; }
</style>
</head>
<body>

<div class="app-header">
  <div class="app-name">Mackie's <span>Diary</span></div>
  <div class="app-date" id="today-date"></div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="nav-btn active" onclick="showPage('home')" id="nav-home">
    <span class="nav-icon">🏠</span>Week
  </button>
  <button class="nav-btn" onclick="showPage('meals')" id="nav-meals">
    <span class="nav-icon">🥗</span>Meals
  </button>
  <button class="nav-btn" onclick="showPage('train')" id="nav-train">
    <span class="nav-icon">💪</span>Train
  </button>
  <button class="nav-btn" onclick="showPage('notes')" id="nav-notes">
    <span class="nav-icon">📓</span>Notes
  </button>
</div>

<!-- ══════════ HOME PAGE ══════════ -->
<div class="page active" id="page-home">
  <div class="summary-hero">
    <div class="summary-hero-name">Hey Mackie 👋</div>
    <div class="summary-hero-sub">7-day recomp plan · 2000–2200 kcal daily</div>
    <div style="display:flex;gap:16px;margin-top:16px;">
      <div><div style="font-size:22px;font-weight:500;">140–150g</div><div style="font-size:11px;color:rgba(255,255,255,0.6);margin-top:2px;">Protein</div></div>
      <div><div style="font-size:22px;font-weight:500;">220–260g</div><div style="font-size:11px;color:rgba(255,255,255,0.6);margin-top:2px;">Carbs</div></div>
      <div><div style="font-size:22px;font-weight:500;">60–70g</div><div style="font-size:11px;color:rgba(255,255,255,0.6);margin-top:2px;">Fats</div></div>
    </div>
  </div>

  <div style="font-size:13px;font-weight:500;color:var(--mid);margin-bottom:10px;">Tap a day to jump straight in</div>
  <div class="week-grid" id="week-grid"></div>
</div>

<!-- ══════════ MEALS PAGE ══════════ -->
<div class="page" id="page-meals">
  <div class="day-scroll" id="meal-day-scroll"></div>
  <div id="meal-content"></div>
</div>

<!-- ══════════ TRAIN PAGE ══════════ -->
<div class="page" id="page-train">
  <div class="day-scroll" id="train-day-scroll"></div>
  <div id="train-content"></div>
</div>

<!-- ══════════ NOTES PAGE ══════════ -->
<div class="page" id="page-notes">
  <div class="section-title" style="margin-top:8px;">My Notes</div>
  <div class="section-sub">Reflections, how you felt, what to adjust</div>

  <div class="notes-card">
    <div class="notes-card-label">This week's wins 🏆</div>
    <textarea class="notes-textarea" id="note-wins" placeholder="What went well this week..."></textarea>
  </div>
  <div class="notes-card">
    <div class="notes-card-label">How I'm feeling 💭</div>
    <textarea class="notes-textarea" id="note-feeling" placeholder="Energy, sleep, mood, recovery..."></textarea>
  </div>
  <div class="notes-card">
    <div class="notes-card-label">Adjustments to make 🔧</div>
    <textarea class="notes-textarea" id="note-adjust" placeholder="Meals to tweak, exercises to change..."></textarea>
  </div>
  <button class="save-btn" onclick="saveNotes()">Save Notes</button>
  <div style="font-size:12px;color:var(--light);text-align:center;margin-top:8px;" id="save-confirm"></div>
</div>

// ── STATE ─────────────────────────────────────────────
let mealDay = 0, trainDay = 0;
const sets = {}; // { "dayEx_setIdx": {kg, reps, done} }
const prs = {};  // { "dayEx": pr }
const notes = {};

// ── INIT ──────────────────────────────────────────────
document.getElementById('today-date').textContent = new Date().toLocaleDateString('en-AU', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

// Build home grid
const wg = document.getElementById('week-grid');
DAYS.forEach((d, i) => {
  const tagClass = d.tag === 'high' ? 'tag-high' : d.tag === 'mod' ? 'tag-mod' : d.tag === 'run' ? 'tag-run' : 'tag-rest';
  wg.innerHTML += `<div class="week-card" onclick="jumpTo(${i})">
    <div class="week-card-day">${d.short}</div>
    <div class="week-card-name">${d.training}</div>
    <span class="week-card-tag ${tagClass}">${d.tagLabel}</span>
  </div>`;
});

// Build day pills
function buildPills(containerId, selected, onclick) {
  const c = document.getElementById(containerId);
  c.innerHTML = DAYS.map((d, i) =>
    `<button class="day-pill${i === selected ? ' active' : ''}" onclick="${onclick}(${i})">${d.short}</button>`
  ).join('');
}

buildPills('meal-day-scroll', 0, 'setMealDay');
buildPills('train-day-scroll', 0, 'setTrainDay');

renderMeals(0);
renderTrain(0);
loadNotes();

// ── NAVIGATION ────────────────────────────────────────
function showPage(p) {
  document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('page-' + p).classList.add('active');
  document.getElementById('nav-' + p).classList.add('active');
}

function jumpTo(i) {
  setMealDay(i);
  setTrainDay(i);
  showPage('meals');
}

// ── MEALS ─────────────────────────────────────────────
function setMealDay(i) {
  mealDay = i;
  buildPills('meal-day-scroll', i, 'setMealDay');
  renderMeals(i);
}

function renderMeals(i) {
  const d = DAYS[i];
  const tagClass = d.tag === 'high' ? 'tag-high' : d.tag === 'mod' ? 'tag-mod' : d.tag === 'run' ? 'tag-run' : 'tag-rest';
  let html = `
    <div class="section-title">${d.name}</div>
    <div class="section-sub">${d.training}</div>
    <span class="tag-pill ${tagClass}">${d.tagLabel}</span>
    <div class="macro-row">
      <div class="macro-card"><div class="macro-num">${d.kcal}</div><div class="macro-lbl">kcal</div></div>
      <div class="macro-card"><div class="macro-num">${d.P}g</div><div class="macro-lbl">Protein</div></div>
      <div class="macro-card"><div class="macro-num">${d.C}g</div><div class="macro-lbl">Carbs</div></div>
      <div class="macro-card"><div class="macro-num">${d.F}g</div><div class="macro-lbl">Fats</div></div>
    </div>`;
  d.meals.forEach(m => {
    html += `<div class="meal-card${m.dessert ? ' dessert' : m.preworkout ? ' preworkout' : ''}">
      <div class="meal-top">
        <div class="meal-type">${m.type}</div>
        <div class="meal-kcal">${m.kcal} kcal</div>
      </div>
      <div class="meal-name">${m.name}</div>
      <div class="meal-macros">${m.p}g P · ${m.c}g C · ${m.f}g F</div>
      <div class="ingredient-list">${m.items.map(it => `<div class="ingredient">${it}</div>`).join('')}</div>
    </div>`;
  });
  document.getElementById('meal-content').innerHTML = html;
}

// ── TRAINING ──────────────────────────────────────────
function setTrainDay(i) {
  trainDay = i;
  buildPills('train-day-scroll', i, 'setTrainDay');
  renderTrain(i);
}

function renderTrain(i) {
  const d = DAYS[i];
  const tagClass = d.tag === 'high' ? 'tag-high' : d.tag === 'mod' ? 'tag-mod' : d.tag === 'run' ? 'tag-run' : 'tag-rest';
  let html = `
    <div class="section-title">${d.name}</div>
    <div class="section-sub">${d.training}</div>
    <span class="tag-pill ${tagClass}">${d.tagLabel}</span>`;

  d.exercises.forEach((ex, ei) => {
    const badgeClass = ex.badge === 'Main' ? 'badge-main' : ex.badge === 'Finisher' ? 'badge-finish' : 'badge-warm';
    const key = `${i}_${ei}`;
    const numSets = ex.workSets || 0;

    // PR input
    const prVal = prs[key] || '';
    let prHtml = numSets > 0 ? `<div class="pr-box">
      <div class="pr-label">PR</div>
      <input class="pr-input" type="text" inputmode="decimal" placeholder="e.g. 60kg × 8" value="${prVal}" onchange="savePR('${key}', this.value)" />
    </div>` : '';

    // Set tracker
    let setHtml = '';
    if (numSets > 0) {
      setHtml = `<div class="set-tracker">
        <div class="set-tracker-label">Log your sets</div>`;
      for (let s = 0; s < numSets; s++) {
        const sk = `${key}_${s}`;
        const sv = sets[sk] || {};
        setHtml += `<div class="set-row" id="row-${sk}">
          <span class="set-num">Set ${s + 1}</span>
          <input class="set-input" type="text" inputmode="decimal" placeholder="kg" value="${sv.kg || ''}" onchange="saveSet('${sk}','kg',this.value)" />
          <input class="set-input" type="text" inputmode="numeric" placeholder="reps" value="${sv.reps || ''}" onchange="saveSet('${sk}','reps',this.value)" />
          <div class="set-check${sv.done ? ' done' : ''}" id="chk-${sk}" onclick="toggleSet('${sk}')">
            ${sv.done ? '✓' : ''}
          </div>
        </div>`;
      }
      setHtml += '</div>';
    }

    html += `<div class="exercise-card">
      <div class="ex-header">
        <div class="ex-name">${ex.name}</div>
        <span class="ex-badge ${badgeClass}">${ex.badge}</span>
      </div>
      <div class="ex-sets-row">${ex.sets}</div>
      <div class="ex-rest">Rest: ${ex.rest}</div>
      <div class="ex-notes">${ex.notes}</div>
      ${setHtml}
      ${prHtml}
    </div>`;
  });

  html += `<div class="progress-box">
    <div class="progress-title">When to increase weight</div>
    <div class="progress-text">${d.progressTip}</div>
  </div>`;

  document.getElementById('train-content').innerHTML = html;
}

function saveSet(sk, field, val) {
  if (!sets[sk]) sets[sk] = {};
  sets[sk][field] = val;
}

function toggleSet(sk) {
  if (!sets[sk]) sets[sk] = {};
  sets[sk].done = !sets[sk].done;
  const chk = document.getElementById('chk-' + sk);
  if (sets[sk].done) { chk.classList.add('done'); chk.textContent = '✓'; }
  else { chk.classList.remove('done'); chk.textContent = ''; }
}

function savePR(key, val) {
  prs[key] = val;
}

// ── NOTES ─────────────────────────────────────────────
function saveNotes() {
  notes.wins = document.getElementById('note-wins').value;
  notes.feeling = document.getElementById('note-feeling').value;
  notes.adjust = document.getElementById('note-adjust').value;
  document.getElementById('save-confirm').textContent = '✓ Saved!';
  setTimeout(() => document.getElementById('save-confirm').textContent = '', 2000);
}

function loadNotes() {
  if (notes.wins) document.getElementById('note-wins').value = notes.wins;
  if (notes.feeling) document.getElementById('note-feeling').value = notes.feeling;
  if (notes.adjust) document.getElementById('note-adjust').value = notes.adjust;
}
</script>
